  <!-- ═══ Docs Layout (sidebar + named outlet for doc sub-routes) ═══ -->
  <div class="docs-layout-wrapper">
    <style>
    /* ══════════════════════════════════════════════════════════════════
       DOCUMENTATION PAGE
       ══════════════════════════════════════════════════════════════════ */
    .doc-title {
      font-family: var(--font-heading);
      font-size: 32px;
      font-weight: bold;
      color: var(--text);
    }
    .doc-subtitle {
      font-family: var(--font-heading);
      font-size: 20px;
      font-weight: 600;
      color: var(--text);
      margin-top: 32px;
    }
    .doc-text {
      font-family: var(--font-body);
      font-size: 16px;
      color: var(--text-secondary);
      line-height: 1.7;
    }
    .doc-section {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .doc-section + .doc-section {
      padding-top: 48px;
      border-top: 1px solid var(--border);
    }
    .doc-section > .doc-subtitle:first-child {
      margin-top: 0;
    }
    .concepts-grid {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .next-steps {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    .next-steps .btn {
      padding: 10px 20px;
      font-size: 14px;
    }
    .doc-table {
      width: 100%;
      border-collapse: collapse;
      font-family: var(--font-body);
      font-size: 14px;
      margin: 16px 0;
    }
    .doc-table th {
      text-align: left;
      padding: 12px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      font-weight: 600;
      color: var(--text);
    }
    .doc-table td {
      padding: 10px 16px;
      border: 1px solid var(--border);
      color: var(--text-secondary);
      vertical-align: top;
    }
    .doc-table code {
      font-size: 13px;
    }
    .demo-card {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      margin: 16px 0;
    }
    .demo-card-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px 20px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }
    .demo-card-header h3 {
      font-family: var(--font-heading);
      font-size: 16px;
      font-weight: 600;
      color: var(--text);
    }
    .demo-tag {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--primary);
      background: var(--primary-surface);
      padding: 4px 8px;
      border-radius: 4px;
    }
    .demo-card-body {
      padding: 20px;
    }
    .demo-split {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      margin: 12px 0;
    }
    .demo-code {
      background: var(--code-bg);
      padding: 20px;
      overflow: auto;
    }
    .demo-code pre {
      margin: 0;
      font-family: var(--font-mono);
      font-size: 13px;
      line-height: 1.7;
      color: #E2E8F0;
    }
    .demo-preview {
      padding: 20px;
      background: var(--white);
      border-left: 1px solid var(--border);
    }
    .demo-result-label {
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-dim);
      margin-bottom: 12px;
    }
    .demo-note {
      margin-top: 12px;
      padding: 12px 16px;
      background: var(--surface);
      border-radius: var(--radius-sm);
      font-size: 13px;
      color: var(--text-muted);
      line-height: 1.6;
    }
    .cheatsheet-grid {
      display: flex;
      flex-direction: column;
      gap: 24px;
    }
    .cheatsheet-group-title {
      font-family: var(--font-heading);
      font-size: 24px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 12px;
      padding-bottom: 8px;
      border-bottom: 2px solid var(--primary);
    }
    .progress-bar {
      height: 8px;
      background: var(--border);
      border-radius: 4px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: var(--primary);
      border-radius: 4px;
      transition: width 0.3s;
    }
    .alert {
      padding: 12px 16px;
      border-radius: var(--radius-sm);
      font-size: 14px;
    }
    .alert-info {
      background: var(--primary-surface);
      color: var(--primary-dark);
      border: 1px solid var(--primary);
    }
    .alert-error {
      background: #FEF2F2;
      color: var(--error);
      border: 1px solid var(--error);
    }
    .alert-success {
      background: #F0FDF4;
      color: #16A34A;
      border: 1px solid var(--success);
    }
    .item-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: var(--radius-sm);
      transition: background 0.15s;
    }
    .item-row:hover {
      background: var(--surface);
    }
    .item-index {
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--text-dim);
      width: 24px;
    }
    .item-name {
      font-family: var(--font-body);
      font-size: 14px;
      color: var(--text);
    }
    .item-meta {
      font-family: var(--font-body);
      font-size: 13px;
      color: var(--text-muted);
      margin-left: auto;
    }
    .animate-pulse {
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    .badge-success { background: #F0FDF4; color: var(--success); }
    .badge-warning { background: #FFFBEB; color: var(--warning); }
    .badge-primary { background: var(--primary-surface); color: var(--primary); }
    .table {
      width: 100%;
      border-collapse: collapse;
    }
    .table td {
      padding: 8px 12px;
      border-bottom: 1px solid var(--border);
      font-size: 14px;
    }
    .btn-primary.btn-sm { background: var(--primary); color: var(--white); }
    .btn-danger { background: var(--error); color: var(--white); }
    .btn-success { background: var(--success); color: var(--white); }
    .checkbox-label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      cursor: pointer;
    }
    .user-card {
      padding: 16px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
    }
    @keyframes skl-shimmer {
      0%   { background-position: -600px 0; }
      100% { background-position: 600px 0; }
    }
    .doc-skeleton {
      padding: 48px 0 64px;
    }
    .doc-skeleton > * {
      background: linear-gradient(90deg, var(--border) 25%, var(--surface) 50%, var(--border) 75%);
      background-size: 600px 100%;
      animation: skl-shimmer 1.5s infinite linear;
      border-radius: 6px;
      display: block;
    }
    .skl-badge  { width: 72px;  height: 22px; margin-bottom: 20px; }
    .skl-h1     { width: 52%;   height: 36px; margin-bottom: 14px; }
    .skl-sub    { width: 70%;   height: 18px; margin-bottom: 40px; }

    .doc-with-sidebar .doc-main > [id]:has(.doc-section) .doc-skeleton,
    .doc-with-sidebar .doc-main > [id]:has(.hero-section) .doc-skeleton {
      display: none;

    @media (max-width: 768px) {
      .demo-split { grid-template-columns: 1fr; }

      .doc-table { display: block; overflow-x: auto; -webkit-overflow-scrolling: touch; font-size: 12px; }
      .doc-table th, .doc-table td { padding: 8px 10px; }
    }
    </style>

    <template id="doc-skeleton">

          <div class="skl-sidebar-group"><div class="skl-sidebar-title"></div><div class="skl-sidebar-link w85"></div><div class="skl-sidebar-link"></div><div class="skl-sidebar-link w75"></div></div>
          <div class="skl-sidebar-group"><div class="skl-sidebar-title"></div><div class="skl-sidebar-link"></div><div class="skl-sidebar-link w75"></div><div class="skl-sidebar-link w65"></div><div class="skl-sidebar-link w85"></div></div>

  <!-- ═══ Scripts ═══ -->
  <script src="https://cdn.no-js.dev/"></script>
  <script>
    // ── Global NoJS configuration ──
    NoJS.config({
        debug: true,
        router: {
          useHash: true,
          templates: ''
        },
    });

    // ── i18n setup (external locale files) ──
    NoJS.i18n({
      loadPath: 'locales/{locale}/{ns}.json',
      ns: ['shell'],
      persist: true,
      detectBrowser: true,
      defaultLocale: 'pt'
    });

    // ── Custom filters (for filter demos) ──
    NoJS.filter('highlight', function(text, term) {
      if (!term) return text;
      var re = new RegExp('(' + term.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi');
      return text.replace(re, '<mark>$1</mark>');
    });
    NoJS.filter('initials', function(name) {
      if (!name) return '';
      return name.split(' ').map(function(w) { return w[0]; }).join('').toUpperCase();
    });
    NoJS.filter('timeAgo', function(date) {
      var seconds = Math.floor((new Date() - new Date(date)) / 1000);
      if (seconds < 60) return seconds + 's ago';
      if (seconds < 3600) return Math.floor(seconds / 60) + 'm ago';
      if (seconds < 86400) return Math.floor(seconds / 3600) + 'h ago';
      return Math.floor(seconds / 86400) + 'd ago';
    });

    // ── Custom validators (for validation demos) ──
    NoJS.validator('phone', function(value) {
      return /^\+?[\d\s\-()]{7,15}$/.test(value);
    });
    NoJS.validator('strongPassword', function(value) {
      return value && value.length >= 8 && /[A-Z]/.test(value) && /[0-9]/.test(value) && /[^A-Za-z0-9]/.test(value);
    });
    NoJS.validator('url', function(value) {
      try { new URL(value); return true; } catch(e) { return false; }
    });

    // ── Custom directives (for directive demos) ──
    NoJS.directive('tooltip', {
      init: function(el, attrName, value) {
        var ctx = NoJS.findContext(el);
        if (ctx) {
          ctx.__watchers.push(function() { el.title = NoJS.evaluate(value, ctx); });
        } else { el.title = value; }
        el.style.cursor = 'help';
        el.style.borderBottom = '1px dashed currentColor';
      }
    });
    // ── Load playground engine on demand ──
    function _loadPlaygroundEngine() {
      if (location.hash.indexOf('/playground') === 0 || location.hash.indexOf('#/playground') === 0) {
        if (!document.getElementById('pg-engine')) {
          var s = document.createElement('script');
          s.id = 'pg-engine';
          s.src = 'playground/engine.js';
          document.body.appendChild(s);
        }
      }
    }
    window.addEventListener('hashchange', _loadPlaygroundEngine);
    _loadPlaygroundEngine();

    NoJS.directive('auto-focus', {
      init: function(el) { setTimeout(function() { el.focus(); }, 100); }
    });
    NoJS.directive('char-count', {
      init: function(el, attrName, maxStr) {
        var max = parseInt(maxStr) || 100;
        var counter = document.createElement('div');
        counter.style.cssText = 'font-size:0.75rem;color:var(--text-dim);text-align:right;margin-top:0.25rem;';
        el.parentNode.insertBefore(counter, el.nextSibling);
        function update() {
          var remaining = max - el.value.length;
          counter.textContent = remaining + ' / ' + max + ' characters remaining';
          counter.style.color = remaining < 10 ? 'var(--error)' : remaining < 30 ? 'var(--warning)' : 'var(--text-dim)';
        }
        el.addEventListener('input', update);
        update();
      }
    });

    NoJS.directive('faq-filter', {
      priority: 25,
      init: function(el, attrName, keysAttr) {
        var ctx = NoJS.findContext(el);
        var isGroup = !keysAttr;
        var keys = isGroup ? [] : keysAttr.split(',').map(function(k) { return k.trim(); });
        var currentState;

        function update() {
          var search = NoJS.evaluate('search', ctx);
          var visible;

          if (!search) {
            visible = true;
          } else if (isGroup) {
            var items = el.querySelectorAll('[faq-filter]:not(section)');
            visible = Array.prototype.some.call(items, function(item) {
              return item.style.display !== 'none';
            });
          } else {
            var term = search.toLowerCase();
            visible = keys.some(function(key) {
              var text = NoJS.evaluate("$i18n.t('" + key + "')", ctx);
              if (text && text.toLowerCase().indexOf(term) !== -1) return true;
              var answerKey = key.replace(/\.question$/, '.answer');
              var answer = NoJS.evaluate("$i18n.t('" + answerKey + "')", ctx);
              return answer && answer.toLowerCase().indexOf(term) !== -1;
            });
          }

          if (visible !== currentState) {
            el.style.display = visible ? '' : 'none';
            currentState = visible;
          }
        }

        ctx.$watch(update);
        if (!isGroup) update();
      }
    });

    // ── Docs sub-route registration ──
    // Each doc section is a named-outlet route: default outlet gets an empty
    // template (hides main content), "docs" outlet loads the section .tpl file.
    (function() {
      var sections = [
        'getting-started', 'cheatsheet', 'actions-refs', 'custom-directives',
        'plugins', 'error-handling', 'configuration', 'state-management',
        'events', 'data-binding', 'conditionals', 'loops', 'templates',
        'data-fetching', 'routing', 'head-management', 'forms-validation',
        'styling', 'drag-and-drop', 'animations', 'filters', 'i18n'
      ];
      sections.forEach(function(s) {
        var defTpl = document.createElement('template');
        defTpl.setAttribute('route', '/docs/' + s);
        document.body.appendChild(defTpl);

        var docTpl = document.createElement('template');
        docTpl.setAttribute('route', '/docs/' + s);
        docTpl.setAttribute('outlet', 'docs');
        docTpl.setAttribute('src', 'templates/docs/' + s + '.tpl');
        docTpl.setAttribute('i18n-ns', 'docs');
        document.body.appendChild(docTpl);
      });

      // Redirect /docs → /docs/getting-started
      var redirect = document.createElement('template');
      redirect.setAttribute('route', '/docs');
      redirect.setAttribute('guard', 'false');
      redirect.setAttribute('redirect', '/docs/getting-started');
      document.body.appendChild(redirect);
    })();
  </script>
