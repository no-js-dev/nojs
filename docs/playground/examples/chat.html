<!-- Templates: reusable HTML fragments used by loops -->

<!-- Contact template: renders a single contact row in the sidebar -->
<template id="contact-tpl">
  <!-- class-map: applies active styling when this contact is selected -->
  <!-- $index: built-in loop variable — the current iteration index -->
  <!-- on:click: sets activeChat to this contact's index -->
  <div class="flex items-center gap-2.5 p-2.5 rounded-lg cursor-pointer hover:bg-slate-100 transition-colors"
    class-map="{ 'bg-blue-50 rounded-r-none -mr-2 pr-[18px]': activeChat === $index }"
    on:click="activeChat = $index">
    <div class="flex-1 min-w-0">
      <!-- bind: displays the contact's name reactively -->
      <div class="text-slate-700 text-[13px] font-medium" bind="contact.name"></div>
      <!-- bind: shows the last message text as a preview (computed expression) -->
      <div class="text-slate-500 text-[11px] whitespace-nowrap overflow-hidden text-ellipsis"
        bind="contact.messages[contact.messages.length - 1].text"></div>
    </div>
    <!-- class-map: toggles green/gray dot based on online status -->
    <div class="w-2 h-2 rounded-full shrink-0"
      class-map="{ 'bg-green-500': contact.status === 'online', 'bg-slate-500': contact.status !== 'online' }"></div>
  </div>
</template>

<!-- Message template: renders a single chat bubble -->
<template id="message-tpl">
  <!-- class-map: aligns sent messages right, received messages left -->
  <div class="flex flex-col gap-1 max-w-[75%]"
    class-map="{ 'self-end': msg.sent, 'self-start': !msg.sent }">
    <!-- class-map: applies blue bubble for sent, white for received -->
    <!-- bind: displays the message text -->
    <div class="py-2 px-3 text-[13px] leading-relaxed rounded-xl"
      class-map="{ 'bg-sky-500 text-white rounded-br-sm': msg.sent, 'bg-white text-slate-900 rounded-bl-sm': !msg.sent }"
      bind="msg.text"></div>
    <!-- class-map: right-aligns timestamp for sent messages -->
    <!-- bind: displays the message time -->
    <span class="text-[10px] text-slate-400 px-1"
      class-map="{ 'text-right': msg.sent }"
      bind="msg.time"></span>
  </div>
</template>

<!-- state: declares reactive variables for this component -->
<!-- get: fetches JSON data from a URL on init -->
<!-- as: assigns the fetched data to the "initial" variable -->
<!-- then: runs after fetch completes — seeds contacts from the loaded data -->
<div class="h-screen" state="{ activeChat: 0, newMsg: '', contacts: [] }"
     get="playground/data/chat.json" as="initial"
     then="contacts = initial.contacts">
  <div class="flex w-full h-full">
    <!-- Sidebar -->
    <div class="w-[200px] bg-white border-r border-slate-200 flex flex-col">
      <div class="p-4 border-b border-slate-200">
        <h2 class="text-slate-900 text-base font-bold">💬 Messages</h2>
        <!-- bind: computed expression — counts contacts with status 'online' -->
        <p class="text-slate-400 text-[11px] mt-0.5"
          bind="contacts.filter(c => c.status === 'online').length + ' online'"></p>
      </div>
      <div class="flex-1 overflow-y-auto p-2">
        <!-- each: loops over contacts array, rendering contact-tpl for each -->
        <div each="contact in contacts" template="contact-tpl" style="display:contents"></div>
      </div>
    </div>

    <!-- Chat area -->
    <div class="flex-1 flex flex-col bg-blue-50">
      <div class="py-2.5 px-4 border-b border-slate-200 flex items-center gap-2.5 bg-white">
        <div class="w-8 h-8 rounded-full bg-sky-500 flex items-center justify-center text-white text-base shrink-0">👤</div>
        <div>
          <!-- bind: displays the active contact's name (bracket notation for dynamic index) -->
          <h3 class="text-sm text-slate-900 font-semibold" bind="contacts[activeChat].name"></h3>
          <!-- bind: ternary expression — shows Online/Offline based on status -->
          <span class="text-[11px] text-slate-500"
            bind="contacts[activeChat].status === 'online' ? '● Online' : '○ Offline'"></span>
        </div>
      </div>

      <div class="flex-1 py-3 px-4 overflow-y-auto flex flex-col gap-2">
        <!-- each: loops over the active contact's messages (dynamic path with bracket notation) -->
        <div each="msg in contacts[activeChat].messages" template="message-tpl" style="display:contents"></div>
      </div>

      <div class="py-2.5 px-4 border-t border-slate-200 flex gap-2 items-center bg-white">
        <div class="relative flex-1 flex gap-2 items-center">
          <!-- model: two-way binding between input value and newMsg state -->
          <!-- on:keydown.enter: sends message on Enter — appends to messages array and clears input -->
          <input class="flex-1 py-2.5 px-3.5 border border-slate-200 rounded-2xl text-[13px] font-[inherit] outline-none focus:border-sky-500 transition-colors"
            model="newMsg" placeholder="Type a message..."
            on:keydown.enter="contacts[activeChat].messages = newMsg.trim() ? [...contacts[activeChat].messages, { text: newMsg.trim(), sent: true, time: window._nowTime() }] : contacts[activeChat].messages; newMsg = newMsg.trim() ? '' : newMsg">
          <!-- on:click: same send logic as Enter key, triggered by button click -->
          <button class="bg-sky-500 text-white border-0 w-8 h-8 rounded-full cursor-pointer text-sm flex items-center justify-center hover:bg-sky-600 disabled:bg-slate-300 disabled:cursor-not-allowed transition-colors"
            on:click="contacts[activeChat].messages = newMsg.trim() ? [...contacts[activeChat].messages, { text: newMsg.trim(), sent: true, time: window._nowTime() }] : contacts[activeChat].messages; newMsg = newMsg.trim() ? '' : newMsg"
            title="Send">▶</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
// Helper: returns current time as HH:MM (available in expressions via window._nowTime())
window._nowTime = () => new Date().toLocaleTimeString('en', { hour: '2-digit', minute: '2-digit' });
// Enable debug logging in the console
NoJS.config({ debug: true });
// Initialize No.JS — processes all directives in the DOM
NoJS.init();
</script>
