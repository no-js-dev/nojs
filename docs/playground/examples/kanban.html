<!-- Templates: reusable HTML fragments used by drag-list and loops -->

<!-- Tag template: renders a single tag label with conditional colors -->
<template id="tag-tpl">
  <!-- class-map: toggles Tailwind classes based on the tag value -->
  <!-- bind: displays the tag text content reactively -->
  <span class="text-[10px] py-0.5 px-2 rounded font-semibold"
    class-map="{ 'bg-sky-500/10 text-sky-600': tag==='feat', 'bg-red-500/10 text-red-600': tag==='bug', 'bg-purple-500/10 text-purple-600': tag==='docs', 'bg-orange-500/10 text-orange-600': tag==='high' }"
    bind="tag"></span>
</template>

<!-- Card template: renders a single task card -->
<template id="card-tpl">
  <div class="bg-white border border-slate-200 rounded-lg p-2.5 cursor-grab hover:border-slate-300 hover:shadow-md transition-all"
    drag-class="opacity-50 scale-95">
    <!-- bind: reactively renders card.title as text -->
    <div class="text-slate-800 text-[13px] font-medium mb-2" bind="card.title"></div>
    <div class="flex gap-1 flex-wrap mb-2">
      <!-- each: loops over card.tags, rendering tag-tpl for each item -->
      <div each="tag in card.tags" template="tag-tpl" style="display:contents"></div>
    </div>
    <div class="flex items-center justify-between">
      <!-- bind: reactively renders the card date -->
      <span class="text-slate-400 text-[11px]" bind="card.date"></span>
      <!-- on:click: removes this card from the column by filtering it out -->
      <button class="bg-transparent border-0 text-slate-400 cursor-pointer text-xs w-5 h-5 flex items-center justify-center rounded-full hover:text-red-500 hover:bg-red-500/10 transition-all"
        on:click="col.cards = col.cards.filter(c => c.id !== card.id)" title="Delete">✕</button>
    </div>
  </div>
</template>

<!-- Column template: renders a kanban column with its header, cards, and add form -->
<template id="column-tpl">
  <div class="bg-blue-50 rounded-xl min-w-[260px] max-w-[260px] flex flex-col max-h-full">
    <div class="px-3.5 pt-3 pb-2 flex items-center justify-between">
      <div class="flex items-center gap-2">
        <!-- bind: displays the column title -->
        <h2 class="text-slate-700 text-sm font-semibold" bind="col.title"></h2>
        <!-- bind: displays the card count (computed expression) -->
        <span class="bg-black/[0.08] text-slate-500 text-[11px] py-0.5 px-2 rounded-full" bind="col.cards.length"></span>
      </div>
    </div>
    <div class="px-2 pb-2 overflow-y-auto flex-1 flex flex-col gap-1.5"
      drag-list="col.cards" template="card-tpl" drag-list-item="card"
      drag-type="kanban-card" drop-accept="kanban-card"
      drag-list-key="id" drag-list-remove
      drop-placeholder="auto"
      drop-empty-class="min-h-[3rem] border-2 border-dashed border-slate-200 rounded-lg">
      <!-- drag-list: sortable list bound to col.cards -->
      <!-- Cards can be reordered within or dragged between columns -->
    </div>
    <div class="p-2">
      <!-- show: only visible when this column is NOT in "adding" mode -->
      <div show="addingTo !== col.id">
        <!-- on:click: sets addingTo to this column's id, switching to add mode -->
        <button class="w-full py-1.5 bg-transparent border border-dashed border-slate-300 rounded-lg text-slate-400 cursor-pointer text-xs hover:border-sky-500 hover:text-sky-500 hover:bg-sky-500/5 transition-all"
          on:click="addingTo = col.id; newTask = ''">+ Add card</button>
      </div>
      <!-- show: only visible when this column IS in "adding" mode -->
      <div show="addingTo === col.id">
        <!-- model: two-way binding between input value and newTask state -->
        <!-- on:keydown.enter: adds a new card on Enter key press -->
        <input class="w-full py-2 px-2.5 bg-white border border-slate-200 rounded-md text-slate-800 text-[13px] font-[inherit] mb-1.5 outline-none focus:border-sky-500"
          model="newTask" placeholder="Enter task title..."
          on:keydown.enter="col.cards = newTask.trim() ? [...col.cards, { id: nextId, title: newTask.trim(), tags: ['feat'], date: window._today() }] : col.cards; nextId = newTask.trim() ? nextId + 1 : nextId; addingTo = newTask.trim() ? null : addingTo; newTask = newTask.trim() ? '' : newTask">
        <div class="flex gap-1.5">
          <!-- on:click: adds the new card to the column and resets the form -->
          <button class="py-1.5 px-3.5 bg-sky-500 text-white border-0 rounded-md cursor-pointer text-xs font-medium hover:bg-sky-600"
            on:click="col.cards = newTask.trim() ? [...col.cards, { id: nextId, title: newTask.trim(), tags: ['feat'], date: window._today() }] : col.cards; nextId = newTask.trim() ? nextId + 1 : nextId; addingTo = newTask.trim() ? null : addingTo; newTask = newTask.trim() ? '' : newTask">Add</button>
          <!-- on:click: cancels add mode -->
          <button class="py-1.5 px-3.5 bg-transparent text-slate-400 border-0 cursor-pointer text-xs hover:text-slate-700"
            on:click="addingTo = null; newTask = ''">Cancel</button>
        </div>
      </div>
    </div>
  </div>
</template>

<!-- state: declares reactive variables for this component -->
<!-- get: fetches JSON data from a URL on init -->
<!-- as: assigns the fetched data to the "initial" variable -->
<!-- then: runs after fetch completes — seeds state from the loaded data -->
<div state="{ nextId: 7, addingTo: null, newTask: '', columns: [] }"
     get="playground/data/kanban.json" as="initial"
     then="columns = initial.columns; nextId = initial.nextId">
  <div class="bg-white border-b border-slate-200 px-5 py-2.5 flex items-center justify-between">
    <h1 class="text-slate-900 text-lg font-bold">Project Board</h1>
    <!-- bind: displays a computed expression (total task count across all columns) -->
    <span class="text-slate-500 text-xs" bind="'Total: ' + (columns.reduce((s, c) => s + c.cards.length, 0)) + ' tasks'"></span>
    <!-- on:click: appends a new empty column to the board -->
    <button class="inline-flex items-center gap-1 py-1.5 px-3.5 border border-dashed border-slate-300 rounded-lg bg-transparent cursor-pointer text-slate-400 text-[13px] hover:border-sky-500 hover:text-sky-500 transition-all"
      on:click="columns = [...columns, { id: 'col' + nextId, title: 'New Column', cards: [] }]; nextId++">+ New column</button>
  </div>
  <div class="flex gap-2.5 p-3 px-4 overflow-x-auto h-[calc(100vh-52px)] items-start">
    <!-- each: loops over columns array, rendering column-tpl for each column -->
    <div each="col in columns" template="column-tpl" style="display:contents"></div>
  </div>
</div>

<script>
// Helper: returns today's date as YYYY-MM-DD (available in expressions via window._today())
window._today = () => new Date().toISOString().slice(0, 10);
// Enable debug logging in the console
NoJS.config({ debug: true });
// Initialize No.JS — processes all directives in the DOM
NoJS.init();
</script>
