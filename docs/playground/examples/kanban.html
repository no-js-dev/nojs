<!-- Templates: reusable HTML fragments used by drag-list and loops -->

<!-- Tag template: renders a single tag label with conditional colors -->
<template id="tag-tpl">
  <!-- class-map: toggles classes based on the tag value -->
  <!-- bind: displays the tag text content reactively -->
  <li
    class-map="{ 'feat': tag==='feat', 'bug': tag==='bug', 'docs': tag==='docs', 'high': tag==='high' }"
    bind="tag"></li>
</template>

<!-- Card template: renders a single task card -->
<template id="card-tpl">
  <article
    drag-class="dragging">
    <!-- bind: reactively renders card.title as text -->
    <h3 bind="card.title"></h3>
    <ul class="tags">
      <!-- each: loops over card.tags, rendering tag-tpl for each item -->
      <div each="tag in card.tags" template="tag-tpl" style="display:contents"></div>
    </ul>
    <footer>
      <!-- bind: reactively renders the card date -->
      <time bind="card.date"></time>
      <!-- on:click: removes this card from the column by filtering it out -->
      <button
        on:click="col.cards = col.cards.filter(c => c.id !== card.id)" title="Delete">&#10005;</button>
    </footer>
  </article>
</template>

<!-- Column template: renders a kanban column with its header, cards, and add form -->
<template id="column-tpl">
  <section>
    <header>
      <div>
        <!-- bind: displays the column title -->
        <h2 bind="col.title"></h2>
        <!-- bind: displays the card count (computed expression) -->
        <span bind="col.cards.length"></span>
      </div>
    </header>
    <div class="card-list"
      drag-list="col.cards" template="card-tpl" drag-list-item="card"
      drag-type="kanban-card" drop-accept="kanban-card"
      drag-list-key="id" drag-list-remove
      drop-placeholder="auto"
      drop-empty-class="empty-zone">
      <!-- drag-list: sortable list bound to col.cards -->
      <!-- Cards can be reordered within or dragged between columns -->
    </div>
    <footer>
      <!-- show: only visible when this column is NOT in "adding" mode -->
      <div show="addingTo !== col.id">
        <!-- on:click: sets addingTo to this column's id, switching to add mode -->
        <button
          on:click="addingTo = col.id; newTask = ''">+ Add card</button>
      </div>
      <!-- show: only visible when this column IS in "adding" mode -->
      <div show="addingTo === col.id">
        <!-- model: two-way binding between input value and newTask state -->
        <!-- on:keydown.enter: adds a new card on Enter key press -->
        <input
          model="newTask" placeholder="Enter task title..."
          on:keydown.enter="col.cards = newTask.trim() ? [...col.cards, { id: nextId, title: newTask.trim(), tags: ['feat'], date: window._today() }] : col.cards; nextId = newTask.trim() ? nextId + 1 : nextId; addingTo = newTask.trim() ? null : addingTo; newTask = newTask.trim() ? '' : newTask">
        <div class="add-form-actions">
          <button class="add-btn"
            on:click="col.cards = newTask.trim() ? [...col.cards, { id: nextId, title: newTask.trim(), tags: ['feat'], date: window._today() }] : col.cards; nextId = newTask.trim() ? nextId + 1 : nextId; addingTo = newTask.trim() ? null : addingTo; newTask = newTask.trim() ? '' : newTask">Add</button>
          <button class="cancel-btn"
            on:click="addingTo = null; newTask = ''">Cancel</button>
        </div>
      </div>
    </footer>
  </section>
</template>

<!-- state: declares reactive variables for this component -->
<!-- get: fetches JSON data from a URL on init -->
<!-- as: assigns the fetched data to the "initial" variable -->
<!-- then: runs after fetch completes — seeds state from the loaded data -->
<div data-layout="board" state="{ nextId: 7, addingTo: null, newTask: '', columns: [] }"
     get="playground/data/kanban.json" as="initial"
     then="columns = initial.columns; nextId = initial.nextId">
  <header>
    <h1>Project Board</h1>
    <!-- bind: displays a computed expression (total task count across all columns) -->
    <span bind="'Total: ' + (columns.reduce((s, c) => s + c.cards.length, 0)) + ' tasks'"></span>
    <!-- on:click: appends a new empty column to the board -->
    <button
      on:click="columns = [...columns, { id: 'col' + nextId, title: 'New Column', cards: [] }]; nextId++">+ New column</button>
  </header>
  <main>
    <!-- each: loops over columns array, rendering column-tpl for each column -->
    <div each="col in columns" template="column-tpl" style="display:contents"></div>
  </main>
</div>

<script>
// Helper: returns today's date as YYYY-MM-DD (available in expressions via window._today())
window._today = () => new Date().toISOString().slice(0, 10);
// Enable debug logging in the console
NoJS.config({ debug: true });
// Initialize No.JS — processes all directives in the DOM
NoJS.init();
</script>
